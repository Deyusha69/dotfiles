#  в”ңв”Җв”Өв””в”¬в”ҳв”ңв”Җв”ҳв”ңв”¬в”ҳв”Ӯ  в”ңв”Җв”Өв”Ӯв”Ӯв”Ӯ в”Ӯв”Ӯ
#  в”ҙ в”ҙ в”ҙ в”ҙ  в”ҙв””в”Җв”ҙв”Җв”ҳв”ҙ в”ҙв”ҳв””в”ҳв”Җв”ҙв”ҳ

monitor=,preferred,auto,1
#monitor=HDMI-A-1,1440x900@60,1600x0,1
