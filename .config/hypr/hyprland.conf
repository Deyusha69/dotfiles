# xdg-portal-hyprland
exec-once=~/.config/hypr/scripts/xdg-portal-hyprland

#  в”Ңв”Җв”җв”Ңв”Җв”җв”Ңв”җв”Ңв”Ңв”Җв”җв”¬в”Ңв”Җв”җ
#  в”Ӯ  в”Ӯ в”Ӯв”Ӯв”Ӯв”Ӯв”ңв”Ө в”Ӯв”Ӯ в”¬
#  в””в”Җв”ҳв””в”Җв”ҳв”ҳв””в”ҳв””  в”ҙв””в”Җв”ҳ

input {
    kb_layout=us
    kb_variant=
    kb_model=
    kb_options=
    kb_rules=

    follow_mouse=1
    float_switch_override_focus=true

    touchpad {
        natural_scroll=yes
    }
}

general {
    sensitivity=1.0 # for mouse cursor
    layout=dwindle

    gaps_in=5
    gaps_out=10
    border_size=2

    col.active_border=0xb3cba6f7
    col.inactive_border=0xb3313244

    apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)
}

decoration {
    rounding=5
    blur=true
    blur_size=10 # minimum 1
    blur_passes=4 # minimum 1, more passes = more resource intensive.
    blur_new_optimizations=true
    # Your blur "amount" is blur_size * blur_passes, but high blur_size (over around 5-ish) will produce artifacts.
    # if you want heavy blur, you need to up the blur_passes.
    # the more passes, the more you can up the blur_size without noticing artifacts.
}

animations {
    enabled=1
    # bezier=overshot,0.05,0.9,0.1,1.1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,slide
    animation=border,1,10,default
    animation=fade,1,10,default
    animation=workspaces,1,6,overshot,slidevert
}

dwindle {
    pseudotile=0 # enable pseudotiling on dwindle
    force_split=2
}

master {
    new_is_master=false
}

gestures {
    workspace_swipe=yes
}

misc {
    disable_hyprland_logo=true
    disable_splash_rendering=true
    mouse_move_enables_dpms=true
    vfr=false
}

#  в”¬ в”¬в”¬в”Ңв”җв”Ңв”Ңв”¬в”җв”Ңв”Җв”җв”¬ в”¬  в”¬в”Җв”җв”¬ в”¬в”¬  в”Ңв”Җв”җв”Ңв”Җв”җ
